<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThinkAI Voice Agent Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 480px;
            background: #1a1a2e;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        h1 {
            font-size: 1.4rem;
            margin-bottom: 24px;
            text-align: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .status {
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 0.9rem;
            background: #16213e;
        }
        .status.connected { border-left: 3px solid #4ade80; }
        .status.disconnected { border-left: 3px solid #f87171; }
        .status.speaking { border-left: 3px solid #facc15; }
        #btn {
            display: block;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }
        #btn.start {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        #btn.stop {
            background: linear-gradient(135deg, #f87171, #ef4444);
            color: white;
        }
        #btn:hover { transform: scale(1.02); }
        #btn:disabled { opacity: 0.5; transform: none; cursor: not-allowed; }
        .log {
            margin-top: 16px;
            background: #0f0f1a;
            border-radius: 8px;
            padding: 12px;
            max-height: 250px;
            overflow-y: auto;
            font-family: 'Consolas', monospace;
            font-size: 0.75rem;
            line-height: 1.6;
        }
        .log .info { color: #60a5fa; }
        .log .error { color: #f87171; }
        .log .stt { color: #4ade80; }
        .log .tts { color: #c084fc; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎤 ThinkAI Voice Agent</h1>
        <div id="status" class="status disconnected">Nincs csatlakozva</div>
        <button id="btn" class="start" onclick="toggle()">🎙️ Csatlakozás & Beszéd</button>
        <div id="log" class="log"></div>
    </div>

    <!-- protobuf.js for encoding/decoding Pipecat frames -->
    <script src="https://cdn.jsdelivr.net/npm/protobufjs@7/dist/protobuf.min.js"></script>
    <script>
        let ws = null;
        let audioContext = null;
        let mediaStream = null;
        let processor = null;
        let running = false;
        let Root = null;
        let FrameMsg = null;
        let AudioRawFrameMsg = null;

        const SAMPLE_RATE = 16000;
        const WS_URL = 'ws://localhost:8765';

        const logEl = document.getElementById('log');
        const statusEl = document.getElementById('status');
        const btn = document.getElementById('btn');

        function log(msg, cls = 'info') {
            const time = new Date().toLocaleTimeString();
            logEl.innerHTML += `<div class="${cls}">[${time}] ${msg}</div>`;
            logEl.scrollTop = logEl.scrollHeight;
        }

        function setStatus(text, cls) {
            statusEl.textContent = text;
            statusEl.className = `status ${cls}`;
        }

        // Initialize Protobuf schema
        async function initProtobuf() {
            Root = protobuf.Root.fromJSON({
                nested: {
                    pipecat: {
                        nested: {
                            TextFrame: {
                                fields: {
                                    id: { type: "uint64", id: 1 },
                                    name: { type: "string", id: 2 },
                                    text: { type: "string", id: 3 }
                                }
                            },
                            AudioRawFrame: {
                                fields: {
                                    id: { type: "uint64", id: 1 },
                                    name: { type: "string", id: 2 },
                                    audio: { type: "bytes", id: 3 },
                                    sample_rate: { type: "uint32", id: 4 },
                                    num_channels: { type: "uint32", id: 5 },
                                    pts: { type: "uint64", id: 6 }
                                }
                            },
                            TranscriptionFrame: {
                                fields: {
                                    id: { type: "uint64", id: 1 },
                                    name: { type: "string", id: 2 },
                                    text: { type: "string", id: 3 },
                                    user_id: { type: "string", id: 4 },
                                    timestamp: { type: "string", id: 5 }
                                }
                            },
                            MessageFrame: {
                                fields: {
                                    data: { type: "string", id: 1 }
                                }
                            },
                            Frame: {
                                oneofs: {
                                    frame: { oneof: ["text", "audio", "transcription", "message"] }
                                },
                                fields: {
                                    text: { type: "TextFrame", id: 1 },
                                    audio: { type: "AudioRawFrame", id: 2 },
                                    transcription: { type: "TranscriptionFrame", id: 3 },
                                    message: { type: "MessageFrame", id: 4 }
                                }
                            }
                        }
                    }
                }
            });
            FrameMsg = Root.lookupType("pipecat.Frame");
            AudioRawFrameMsg = Root.lookupType("pipecat.AudioRawFrame");
            log('Protobuf schema loaded');
        }

        function encodeAudioFrame(pcm16Buffer) {
            const frame = FrameMsg.create({
                audio: {
                    audio: new Uint8Array(pcm16Buffer),
                    sample_rate: SAMPLE_RATE,
                    num_channels: 1,
                }
            });
            return FrameMsg.encode(frame).finish();
        }

        function decodeFrame(data) {
            const frame = FrameMsg.decode(new Uint8Array(data));
            return frame;
        }

        // Play received audio (PCM 16-bit LE)
        function playAudio(audioBytes, sampleRate) {
            if (!audioContext) return;

            const pcm16 = new Int16Array(audioBytes.buffer, audioBytes.byteOffset, audioBytes.byteLength / 2);
            const float32 = new Float32Array(pcm16.length);
            for (let i = 0; i < pcm16.length; i++) {
                float32[i] = pcm16[i] / 32768.0;
            }

            const buffer = audioContext.createBuffer(1, float32.length, sampleRate || SAMPLE_RATE);
            buffer.getChannelData(0).set(float32);

            const source = audioContext.createBufferSource();
            source.buffer = buffer;
            source.connect(audioContext.destination);
            source.start();
        }

        // Convert Float32 samples to PCM16 LE bytes
        function float32ToPCM16(float32Array) {
            const buffer = new ArrayBuffer(float32Array.length * 2);
            const view = new DataView(buffer);
            for (let i = 0; i < float32Array.length; i++) {
                let s = Math.max(-1, Math.min(1, float32Array[i]));
                view.setInt16(i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
            }
            return buffer;
        }

        async function startMicrophone() {
            audioContext = new AudioContext({ sampleRate: SAMPLE_RATE });
            mediaStream = await navigator.mediaDevices.getUserMedia({
                audio: {
                    channelCount: 1,
                    sampleRate: SAMPLE_RATE,
                    echoCancellation: true,
                    noiseSuppression: true,
                }
            });

            const source = audioContext.createMediaStreamSource(mediaStream);

            // Use AudioWorklet or ScriptProcessor
            try {
                // ScriptProcessor (simpler, deprecated but widely supported)
                processor = audioContext.createScriptProcessor(4096, 1, 1);
                processor.onaudioprocess = (e) => {
                    if (!running || !ws || ws.readyState !== WebSocket.OPEN) return;
                    const float32 = e.inputBuffer.getChannelData(0);
                    const pcm16 = float32ToPCM16(float32);
                    const encoded = encodeAudioFrame(pcm16);
                    ws.send(encoded);
                };
                source.connect(processor);
                processor.connect(audioContext.destination);
            } catch (err) {
                log('Audio processor error: ' + err.message, 'error');
            }

            log('🎤 Mikrofon aktív (16kHz mono PCM16)');
        }

        function stopMicrophone() {
            if (processor) {
                processor.disconnect();
                processor = null;
            }
            if (mediaStream) {
                mediaStream.getTracks().forEach(t => t.stop());
                mediaStream = null;
            }
            if (audioContext) {
                audioContext.close();
                audioContext = null;
            }
        }

        async function toggle() {
            if (running) {
                stop();
            } else {
                await start();
            }
        }

        async function start() {
            btn.disabled = true;

            if (!FrameMsg) await initProtobuf();

            try {
                // Connect WebSocket
                log(`Csatlakozás: ${WS_URL}...`);
                ws = new WebSocket(WS_URL);
                ws.binaryType = 'arraybuffer';

                ws.onopen = async () => {
                    running = true;
                    setStatus('🟢 Csatlakozva — beszélj!', 'connected');
                    btn.textContent = '⏹️ Leállítás';
                    btn.className = 'stop';
                    btn.disabled = false;
                    log('WebSocket csatlakozva', 'info');

                    await startMicrophone();
                };

                ws.onmessage = (event) => {
                    try {
                        const frame = decodeFrame(event.data);
                        const type = frame.frame;

                        if (type === 'audio' && frame.audio) {
                            const audioData = frame.audio.audio;
                            const sr = frame.audio.sample_rate || SAMPLE_RATE;
                            playAudio(audioData, sr);
                            log(`🔊 TTS audio: ${audioData.byteLength} bytes @ ${sr}Hz`, 'tts');
                        } else if (type === 'text' && frame.text) {
                            log(`💬 Text: ${frame.text.text}`, 'stt');
                        } else if (type === 'transcription' && frame.transcription) {
                            log(`📝 STT: "${frame.transcription.text}"`, 'stt');
                        } else if (type === 'message' && frame.message) {
                            log(`📩 Message: ${frame.message.data}`, 'info');
                        }
                    } catch (err) {
                        log('Frame decode error: ' + err.message, 'error');
                    }
                };

                ws.onerror = (err) => {
                    log('WebSocket hiba', 'error');
                    stop();
                };

                ws.onclose = () => {
                    log('WebSocket bontva');
                    stop();
                };

            } catch (err) {
                log('Hiba: ' + err.message, 'error');
                btn.disabled = false;
            }
        }

        function stop() {
            running = false;
            stopMicrophone();
            if (ws) { ws.close(); ws = null; }
            setStatus('Lecsatlakozva', 'disconnected');
            btn.textContent = '🎙️ Csatlakozás & Beszéd';
            btn.className = 'start';
            btn.disabled = false;
        }
    </script>
</body>
</html>
