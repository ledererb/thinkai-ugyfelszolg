<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThinkAI Asszisztens</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a1a;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Layout ─────────────────────────────────────────── */
        .app {
            display: grid;
            grid-template-columns: 1fr 380px 1fr;
            gap: 0;
            min-height: 100vh;
            max-width: 1400px;
            margin: 0 auto;
        }

        @media (max-width: 1100px) {
            .app {
                grid-template-columns: 1fr;
                grid-template-rows: auto auto auto;
            }
        }

        /* ── Side Panels ────────────────────────────────────── */
        .side-panel {
            padding: 1.5rem 1.2rem;
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(255, 255, 255, 0.06);
        }

        .side-panel:last-child {
            border-right: none;
            border-left: 1px solid rgba(255, 255, 255, 0.06);
        }

        .panel-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .panel-header .icon {
            font-size: 1.3rem;
        }

        .panel-header h2 {
            font-size: 0.95rem;
            font-weight: 600;
            color: #ccd6f6;
            letter-spacing: -0.01em;
        }

        .panel-badge {
            margin-left: auto;
            background: rgba(102, 126, 234, 0.15);
            color: #667eea;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 10px;
        }

        .panel-content {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.1) transparent;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: #4a5568;
            font-size: 0.85rem;
        }

        .empty-state .empty-icon {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
            opacity: 0.4;
        }

        /* ── Calendar items ─────────────────────────────────── */
        .cal-item {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            padding: 0.75rem 0.85rem;
            margin-bottom: 0.5rem;
            transition: all 0.2s;
            animation: slideIn 0.3s ease;
        }

        .cal-item:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(102, 126, 234, 0.3);
        }

        .cal-item .cal-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: #e2e8f0;
            margin-bottom: 0.25rem;
        }

        .cal-item .cal-meta {
            font-size: 0.75rem;
            color: #667eea;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .cal-item .cal-duration {
            color: #8892b0;
            font-size: 0.7rem;
        }

        .cal-item .cal-attendee {
            font-size: 0.7rem;
            color: #64748b;
            margin-top: 0.2rem;
        }

        /* ── Email items ────────────────────────────────────── */
        .email-item {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            padding: 0.75rem 0.85rem;
            margin-bottom: 0.5rem;
            transition: all 0.2s;
            animation: slideIn 0.3s ease;
        }

        .email-item:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(248, 87, 166, 0.3);
        }

        .email-item .email-to {
            font-size: 0.85rem;
            font-weight: 600;
            color: #e2e8f0;
            margin-bottom: 0.15rem;
        }

        .email-item .email-subject {
            font-size: 0.78rem;
            color: #f857a6;
            margin-bottom: 0.3rem;
        }

        .email-item .email-body {
            font-size: 0.75rem;
            color: #a8b2d1;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .email-item .email-meta {
            font-size: 0.68rem;
            color: #64748b;
            margin-top: 0.35rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .email-status {
            display: inline-block;
            font-size: 0.65rem;
            font-weight: 600;
            padding: 1px 6px;
            border-radius: 6px;
        }

        .email-status.sent {
            background: rgba(72, 187, 120, 0.15);
            color: #48bb78;
        }

        .email-status.failed {
            background: rgba(245, 101, 101, 0.15);
            color: #f56565;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── Center Voice Panel ─────────────────────────────── */
        .voice-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            position: relative;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .subtitle {
            color: #8892b0;
            font-size: 0.85rem;
            margin-bottom: 2.5rem;
        }

        /* Mic button */
        .mic-btn {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 2.2rem;
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.2rem;
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.3);
            animation: pulse-idle 2.5s infinite;
        }

        .mic-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 48px rgba(102, 126, 234, 0.5);
        }

        .mic-btn:active {
            transform: scale(0.98);
        }

        .mic-btn.listening {
            background: linear-gradient(135deg, #667eea, #764ba2);
            animation: pulse-blue 2s infinite;
        }

        .mic-btn.thinking {
            background: linear-gradient(135deg, #f6d365, #fda085);
            animation: pulse-orange 1.5s infinite;
        }

        .mic-btn.speaking {
            background: linear-gradient(135deg, #f857a6, #ff5858);
            animation: pulse-pink 2s infinite;
        }

        .mic-btn.connecting {
            background: linear-gradient(135deg, #a8a8a8, #666);
            animation: pulse-gray 1s infinite;
        }

        .mic-btn.reconnecting {
            background: linear-gradient(135deg, #f6d365, #fda085);
            animation: pulse-orange 0.8s infinite;
        }

        @keyframes pulse-idle {

            0%,
            100% {
                box-shadow: 0 8px 32px rgba(102, 126, 234, 0.3);
                transform: scale(1);
            }

            50% {
                box-shadow: 0 8px 48px rgba(102, 126, 234, 0.5);
                transform: scale(1.03);
            }
        }

        @keyframes pulse-blue {

            0%,
            100% {
                box-shadow: 0 0 0 0px rgba(102, 126, 234, 0.4);
            }

            50% {
                box-shadow: 0 0 0 18px rgba(102, 126, 234, 0);
            }
        }

        @keyframes pulse-pink {

            0%,
            100% {
                box-shadow: 0 0 0 0px rgba(248, 87, 166, 0.4);
            }

            50% {
                box-shadow: 0 0 0 18px rgba(248, 87, 166, 0);
            }
        }

        @keyframes pulse-orange {

            0%,
            100% {
                box-shadow: 0 0 0 0px rgba(246, 211, 101, 0.4);
            }

            50% {
                box-shadow: 0 0 0 14px rgba(246, 211, 101, 0);
            }
        }

        @keyframes pulse-gray {

            0%,
            100% {
                box-shadow: 0 0 0 0px rgba(168, 168, 168, 0.3);
            }

            50% {
                box-shadow: 0 0 0 14px rgba(168, 168, 168, 0);
            }
        }

        .mic-btn.speaking::after {
            content: '';
            position: absolute;
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 2px solid rgba(248, 87, 166, 0.3);
            animation: ring 2s infinite;
        }

        @keyframes ring {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            100% {
                transform: scale(1.4);
                opacity: 0;
            }
        }

        .status {
            font-size: 0.9rem;
            color: #8892b0;
            min-height: 1.5em;
            transition: all 0.3s;
        }

        .status.listening {
            color: #667eea;
        }

        .status.thinking {
            color: #fda085;
        }

        .status.speaking {
            color: #f857a6;
        }

        .status.connecting {
            color: #888;
        }

        .status.reconnecting {
            color: #fda085;
        }

        .status.error {
            color: #ff5858;
        }

        /* Visualizer */
        .visualizer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            height: 36px;
            margin-bottom: 0.8rem;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .visualizer.active {
            opacity: 1;
        }

        .visualizer .bar {
            width: 3.5px;
            border-radius: 2px;
            height: 6px;
            transition: height 0.1s, background 0.3s;
            background: linear-gradient(180deg, #667eea, #764ba2);
        }

        .visualizer.agent-speaking .bar {
            background: linear-gradient(180deg, #f857a6, #ff5858);
        }

        .visualizer.active .bar {
            animation: equalize 0.8s infinite ease-in-out;
        }

        .visualizer.active .bar:nth-child(1) {
            animation-delay: 0.0s;
        }

        .visualizer.active .bar:nth-child(2) {
            animation-delay: 0.1s;
        }

        .visualizer.active .bar:nth-child(3) {
            animation-delay: 0.2s;
        }

        .visualizer.active .bar:nth-child(4) {
            animation-delay: 0.3s;
        }

        .visualizer.active .bar:nth-child(5) {
            animation-delay: 0.4s;
        }

        .visualizer.active .bar:nth-child(6) {
            animation-delay: 0.15s;
        }

        .visualizer.active .bar:nth-child(7) {
            animation-delay: 0.25s;
        }

        @keyframes equalize {

            0%,
            100% {
                height: 6px;
            }

            50% {
                height: 28px;
            }
        }

        /* Transcript */
        .transcript {
            margin-top: 1.5rem;
            padding: 0.8rem;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            min-height: 50px;
            font-size: 0.8rem;
            color: #a8b2d1;
            text-align: left;
            max-height: 200px;
            overflow-y: auto;
            width: 100%;
            display: none;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.1) transparent;
        }

        .transcript.visible {
            display: block;
        }

        .transcript .user {
            color: #667eea;
            margin-bottom: 0.3rem;
        }

        .transcript .agent {
            color: #f857a6;
            margin-bottom: 0.3rem;
        }

        /* ── Live dot ───────────────────────────────────────── */
        .live-dot {
            width: 6px;
            height: 6px;
            background: #48bb78;
            border-radius: 50%;
            display: inline-block;
            animation: blink 2s infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }
    </style>
</head>

<body>
    <div class="app">
        <!-- LEFT: Calendar -->
        <div class="side-panel" id="calendarPanel">
            <div class="panel-header">
                <span class="icon">📅</span>
                <h2>Naptár</h2>
                <span class="panel-badge" id="calBadge">0</span>
            </div>
            <div class="panel-content" id="calendarList">
                <div class="empty-state">
                    <div class="empty-icon">📅</div>
                    <p>Nincs még foglalás.<br>Kérd az asszisztenst, hogy foglaljon időpontot!</p>
                </div>
            </div>
        </div>

        <!-- CENTER: Voice -->
        <div class="voice-panel">
            <div class="logo">ThinkAI</div>
            <div class="subtitle">AI Voice Asszisztens</div>

            <div class="visualizer" id="visualizer">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>

            <button class="mic-btn" id="micBtn" onclick="toggleConnection()">🎤</button>
            <div class="status" id="status">Kattints ide, és beszélj velem!</div>
            <div class="transcript" id="transcript"></div>
        </div>

        <!-- RIGHT: Emails -->
        <div class="side-panel">
            <div class="panel-header">
                <span class="icon">📧</span>
                <h2>Küldött emailek</h2>
                <span class="panel-badge" id="emailBadge">0</span>
            </div>
            <div class="panel-content" id="emailList">
                <div class="empty-state">
                    <div class="empty-icon">📧</div>
                    <p>Még nem küldtél emailt.<br>Kérd az asszisztenst email küldésre!</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import {
            Room, RoomEvent, Track, ParticipantEvent, ConnectionState,
        } from 'https://cdn.jsdelivr.net/npm/livekit-client@2/dist/livekit-client.esm.mjs';

        let room = null;
        let connected = false;
        let reconnecting = false;
        let agentSpeaking = false;
        let pollInterval = null;

        const micBtn = document.getElementById('micBtn');
        const statusEl = document.getElementById('status');
        const visualizer = document.getElementById('visualizer');
        const transcript = document.getElementById('transcript');

        // ── State management ─────────────────────────────────
        function setState(state, message) {
            micBtn.classList.remove('listening', 'thinking', 'speaking', 'connecting', 'reconnecting');
            statusEl.classList.remove('listening', 'thinking', 'speaking', 'connecting', 'reconnecting', 'error');
            visualizer.classList.remove('agent-speaking');
            micBtn.classList.add(state);
            statusEl.classList.add(state);
            statusEl.textContent = message;
            if (state === 'speaking') visualizer.classList.add('agent-speaking');
        }

        // ── Toggle Connection ────────────────────────────────
        window.toggleConnection = async function () {
            if (connected) { disconnect(); } else { await connect(); }
        };

        async function connect() {
            setState('connecting', 'Csatlakozás...');
            try {
                const resp = await fetch('/api/token');
                if (!resp.ok) throw new Error('Token hiba');
                const { token, url } = await resp.json();

                room = new Room({
                    audioCaptureDefaults: { autoGainControl: true, echoCancellation: true, noiseSuppression: true },
                    reconnectPolicy: { maxRetries: 5, maxRetryDelay: 5000 },
                });

                room.on(RoomEvent.TrackSubscribed, (track, pub, participant) => {
                    if (track.kind === Track.Kind.Audio) {
                        const el = track.attach();
                        el.id = `audio-${participant.identity}`;
                        document.body.appendChild(el);
                    }
                });
                room.on(RoomEvent.TrackUnsubscribed, (track) => {
                    track.detach().forEach(el => el.remove());
                });

                room.on(RoomEvent.TranscriptionReceived, (segments, participant) => {
                    for (const seg of segments) {
                        if (seg.final) {
                            const isAgent = participant?.identity !== room.localParticipant?.identity;
                            addTranscript(isAgent ? 'agent' : 'user', seg.text);
                        }
                    }
                });
                room.on(RoomEvent.DataReceived, (payload) => {
                    try {
                        const data = JSON.parse(new TextDecoder().decode(payload));
                        if (data.type === 'transcription' && data.text) addTranscript(data.role || 'agent', data.text);
                    } catch (e) { }
                });

                room.on(RoomEvent.ParticipantConnected, (participant) => {
                    participant.on(ParticipantEvent.IsSpeakingChanged, (speaking) => {
                        agentSpeaking = speaking;
                        if (speaking) {
                            setState('speaking', 'Beszélek...');
                            visualizer.classList.add('active');
                        } else {
                            setState('listening', 'Hallgatlak...');
                            visualizer.classList.add('active');
                        }
                    });
                });

                room.on(RoomEvent.ConnectionStateChanged, (state) => {
                    if (state === ConnectionState.Reconnecting) {
                        reconnecting = true; setState('reconnecting', 'Újracsatlakozás...');
                    } else if (state === ConnectionState.Connected && reconnecting) {
                        reconnecting = false; setState('listening', 'Újra csatlakozva!');
                    }
                });
                room.on(RoomEvent.Disconnected, () => { if (!reconnecting) disconnect(); });

                await room.connect(url, token);
                await room.localParticipant.setMicrophoneEnabled(true);

                connected = true;
                setState('listening', 'Hallgatlak...');
                visualizer.classList.add('active');
                transcript.classList.add('visible');

                // Start polling calendar & emails
                startPolling();

            } catch (err) {
                console.error('Connection error:', err);
                setState('error', 'Hiba: ' + err.message);
                micBtn.classList.remove('connecting');
                setTimeout(() => {
                    if (!connected) { statusEl.textContent = 'Kattints ide, és beszélj velem!'; statusEl.className = 'status'; }
                }, 4000);
            }
        }

        function disconnect() {
            if (room) { room.disconnect(); room = null; }
            connected = false; reconnecting = false; agentSpeaking = false;
            micBtn.classList.remove('listening', 'thinking', 'speaking', 'connecting', 'reconnecting');
            statusEl.textContent = 'Kattints ide, és beszélj velem!';
            statusEl.className = 'status';
            visualizer.classList.remove('active', 'agent-speaking');
            stopPolling();
        }

        function normalizeUserText(text) {
            // Remove repeated words/stutters: "a a a" → "a", "az az" → "az"
            text = text.replace(/\b(\w+)(\s+\1)+\b/gi, '$1');
            // Remove Hungarian filler words
            text = text.replace(/\b(hát|szóval|ugye|na|nahát|izé|izé-izé|öö|ö|ööö|ááá|hmm|hm|tehát)\b\s*/gi, '');
            // Fix common STT misspellings of ThinkAI
            text = text.replace(/\b(finkáj|fink éj áj|finkai|finkéjáj|szinkáj|szinkéjáj|szink éj áj|think áj|thinkáj|think éj áj|tinkáj|tinkéjáj|tink éj áj|tinkai|tink ai)\b/gi, 'ThinkAI');
            // Fix common STT misspellings of names
            text = text.replace(/\bleaderrer\b/gi, 'Lederer');
            text = text.replace(/\bleader\b(?=\s+[A-ZÁÉÍÓÖŐÚÜŰ])/gi, 'Lederer');
            // Capitalize sentence start
            text = text.replace(/^\s*\w/, c => c.toUpperCase());
            // Collapse extra spaces
            text = text.replace(/\s{2,}/g, ' ').trim();
            // Remove trailing/leading noise
            text = text.replace(/^[\s,.-]+|[\s,.-]+$/g, '').trim();
            return text;
        }

        function addTranscript(role, text) {
            if (!text || !text.trim()) return;
            // Strip [LANG:XX] tags from display
            text = text.replace(/\[LANG:(HU|EN)\]/gi, '').trim();
            if (!text) return;
            // Clean up phonetic spellings for display (agent text)
            text = text.replace(/[Tt]ink-éj-áj/g, 'ThinkAI');
            text = text.replace(/tink-éj-áj/g, 'ThinkAI');
            text = text.replace(/éj-áj/g, 'AI');
            text = text.replace(/Ízí|ízí/g, 'EAISY');
            text = text.replace(/szé-er-em/g, 'CRM');
            text = text.replace(/é-er-pé/g, 'ERP');
            text = text.replace(/ThinkAI pont há ú/gi, 'thinkai.hu');
            text = text.replace(/helló kukac ThinkAI pont há ú/gi, 'hello@thinkai.hu');
            // Normalize user text (remove stutters, fillers, fix spelling)
            if (role === 'user') {
                text = normalizeUserText(text);
            }
            if (!text) return;
            const div = document.createElement('div');
            div.className = role;
            div.textContent = (role === 'user' ? '🗣️ ' : '🤖 ') + text;
            transcript.appendChild(div);
            transcript.scrollTop = transcript.scrollHeight;
            if (role === 'user' && connected && !agentSpeaking) setState('thinking', 'Gondolkodom...');
        }

        // ── Polling ──────────────────────────────────────────
        let lastCalHash = '';
        let lastEmailHash = '';

        function startPolling() {
            fetchCalendar();
            fetchEmails();
            pollInterval = setInterval(() => {
                fetchCalendar();
                fetchEmails();
            }, 2000);
        }

        function stopPolling() {
            if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
        }

        async function fetchCalendar() {
            try {
                const resp = await fetch('/api/calendar');
                const { events } = await resp.json();
                renderCalendar(events || []);
            } catch (e) { }
        }

        async function fetchEmails() {
            try {
                const resp = await fetch('/api/emails');
                const { emails } = await resp.json();
                renderEmails(emails || []);
            } catch (e) { }
        }

        function renderCalendar(events) {
            const container = document.getElementById('calendarList');
            const badge = document.getElementById('calBadge');
            badge.textContent = events.length;

            if (events.length === 0) {
                container.innerHTML = `<div class="empty-state"><div class="empty-icon">📅</div><p>Nincs még foglalás.<br>Kérd az asszisztenst!</p></div>`;
                return;
            }

            // Only re-render if content changed (not just count)
            const calHash = JSON.stringify(events);
            if (calHash === lastCalHash) return;
            lastCalHash = calHash;

            container.innerHTML = events.map(ev => {
                let dateStr = '';
                try {
                    const d = new Date(ev.start);
                    const months = ['jan', 'feb', 'már', 'ápr', 'máj', 'jún', 'júl', 'aug', 'szep', 'okt', 'nov', 'dec'];
                    dateStr = `${months[d.getMonth()]} ${d.getDate()}. ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
                } catch (e) { dateStr = ev.start; }

                return `<div class="cal-item">
                    <div class="cal-title">${escHtml(ev.title || 'Esemény')}</div>
                    <div class="cal-meta">
                        <span>🕐 ${dateStr}</span>
                        <span class="cal-duration">· ${ev.duration_minutes || 30} perc</span>
                    </div>
                    ${ev.attendee ? `<div class="cal-attendee">👤 ${escHtml(ev.attendee)}</div>` : ''}
                </div>`;
            }).join('');
        }

        function renderEmails(emails) {
            const container = document.getElementById('emailList');
            const badge = document.getElementById('emailBadge');
            badge.textContent = emails.length;

            if (emails.length === 0) {
                container.innerHTML = `<div class="empty-state"><div class="empty-icon">📧</div><p>Még nem küldtél emailt.<br>Kérd az asszisztenst!</p></div>`;
                return;
            }

            const emailHash = JSON.stringify(emails);
            if (emailHash === lastEmailHash) return;
            lastEmailHash = emailHash;

            container.innerHTML = emails.map(em => {
                let timeStr = '';
                try {
                    const d = new Date(em.sent_at);
                    timeStr = `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
                } catch (e) { timeStr = em.sent_at; }

                const statusClass = em.status === 'sent' ? 'sent' : 'failed';
                const statusText = em.status === 'sent' ? '✓ Elküldve' : '✗ Hiba';

                return `<div class="email-item">
                    <div class="email-to">📨 ${escHtml(em.to_name)}</div>
                    <div class="email-addr" style="font-size:0.75rem;color:#667eea;margin-bottom:0.3rem;">${escHtml(em.to_email || '')}</div>
                    <div class="email-subject">${escHtml(em.subject)}</div>
                    <div class="email-body">${escHtml(em.message)}</div>
                    <div class="email-meta">
                        <span>${timeStr}</span>
                        <span class="email-status ${statusClass}">${statusText}</span>
                    </div>
                </div>`;
            }).join('');
        }

        function escHtml(s) {
            const d = document.createElement('div');
            d.textContent = s || '';
            return d.innerHTML;
        }

        // Start polling immediately (so panels show data even without voice)
        startPolling();
    </script>
</body>

</html>
