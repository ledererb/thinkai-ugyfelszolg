<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThinkAI Asszisztens</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a1a;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 420px;
            width: 100%;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .subtitle {
            color: #8892b0;
            font-size: 0.9rem;
            margin-bottom: 3rem;
        }

        /* Mic button */
        .mic-btn {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 2.5rem;
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.3);
        }

        .mic-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 48px rgba(102, 126, 234, 0.5);
        }

        .mic-btn:active {
            transform: scale(0.98);
        }

        /* States */
        .mic-btn.listening {
            background: linear-gradient(135deg, #667eea, #764ba2);
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.4);
            animation: pulse-blue 2s infinite;
        }

        .mic-btn.thinking {
            background: linear-gradient(135deg, #f6d365, #fda085);
            box-shadow: 0 8px 32px rgba(246, 211, 101, 0.4);
            animation: pulse-orange 1.5s infinite;
        }

        .mic-btn.speaking {
            background: linear-gradient(135deg, #f857a6, #ff5858);
            box-shadow: 0 8px 32px rgba(248, 87, 166, 0.4);
            animation: pulse-pink 2s infinite;
        }

        .mic-btn.connecting {
            background: linear-gradient(135deg, #a8a8a8, #666);
            animation: pulse-gray 1s infinite;
        }

        .mic-btn.reconnecting {
            background: linear-gradient(135deg, #f6d365, #fda085);
            animation: pulse-orange 0.8s infinite;
        }

        @keyframes pulse-blue {

            0%,
            100% {
                box-shadow: 0 0 0 0px rgba(102, 126, 234, 0.4);
            }

            50% {
                box-shadow: 0 0 0 20px rgba(102, 126, 234, 0);
            }
        }

        @keyframes pulse-pink {

            0%,
            100% {
                box-shadow: 0 0 0 0px rgba(248, 87, 166, 0.4);
            }

            50% {
                box-shadow: 0 0 0 20px rgba(248, 87, 166, 0);
            }
        }

        @keyframes pulse-orange {

            0%,
            100% {
                box-shadow: 0 0 0 0px rgba(246, 211, 101, 0.4);
            }

            50% {
                box-shadow: 0 0 0 15px rgba(246, 211, 101, 0);
            }
        }

        @keyframes pulse-gray {

            0%,
            100% {
                box-shadow: 0 0 0 0px rgba(168, 168, 168, 0.3);
            }

            50% {
                box-shadow: 0 0 0 15px rgba(168, 168, 168, 0);
            }
        }

        .mic-btn.speaking::after {
            content: '';
            position: absolute;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 2px solid rgba(248, 87, 166, 0.3);
            animation: ring 2s infinite;
        }

        @keyframes ring {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            100% {
                transform: scale(1.4);
                opacity: 0;
            }
        }

        .status {
            font-size: 0.95rem;
            color: #8892b0;
            min-height: 1.5em;
            transition: all 0.3s;
        }

        .status.listening {
            color: #667eea;
        }

        .status.thinking {
            color: #fda085;
        }

        .status.speaking {
            color: #f857a6;
        }

        .status.connecting {
            color: #888;
        }

        .status.reconnecting {
            color: #fda085;
        }

        .status.error {
            color: #ff5858;
        }

        /* Transcription area */
        .transcript {
            margin-top: 2rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            min-height: 60px;
            font-size: 0.85rem;
            color: #a8b2d1;
            text-align: left;
            max-height: 250px;
            overflow-y: auto;
            display: none;
        }

        .transcript.visible {
            display: block;
        }

        .transcript .user {
            color: #667eea;
            margin-bottom: 0.4rem;
        }

        .transcript .agent {
            color: #f857a6;
            margin-bottom: 0.4rem;
        }

        /* Visualizer */
        .visualizer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            height: 40px;
            margin-bottom: 1rem;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .visualizer.active {
            opacity: 1;
        }

        .visualizer .bar {
            width: 4px;
            border-radius: 2px;
            height: 6px;
            transition: height 0.1s, background 0.3s;
            background: linear-gradient(180deg, #667eea, #764ba2);
        }

        /* Bar colors change based on who's active */
        .visualizer.agent-speaking .bar {
            background: linear-gradient(180deg, #f857a6, #ff5858);
        }

        .visualizer.active .bar {
            animation: equalize 0.8s infinite ease-in-out;
        }

        .visualizer.active .bar:nth-child(1) {
            animation-delay: 0.0s;
        }

        .visualizer.active .bar:nth-child(2) {
            animation-delay: 0.1s;
        }

        .visualizer.active .bar:nth-child(3) {
            animation-delay: 0.2s;
        }

        .visualizer.active .bar:nth-child(4) {
            animation-delay: 0.3s;
        }

        .visualizer.active .bar:nth-child(5) {
            animation-delay: 0.4s;
        }

        .visualizer.active .bar:nth-child(6) {
            animation-delay: 0.15s;
        }

        .visualizer.active .bar:nth-child(7) {
            animation-delay: 0.25s;
        }

        @keyframes equalize {

            0%,
            100% {
                height: 6px;
            }

            50% {
                height: 30px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo">ThinkAI</div>
        <div class="subtitle">AI Voice Asszisztens</div>

        <div class="visualizer" id="visualizer">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>

        <button class="mic-btn" id="micBtn" onclick="toggleConnection()">🎤</button>
        <div class="status" id="status">Kattints a mikrofonra az indításhoz</div>

        <div class="transcript" id="transcript"></div>
    </div>

    <script type="module">
        import {
            Room,
            RoomEvent,
            Track,
            ParticipantEvent,
            ConnectionState,
        } from 'https://cdn.jsdelivr.net/npm/livekit-client@2/dist/livekit-client.esm.mjs';

        let room = null;
        let connected = false;
        let reconnecting = false;
        let agentSpeaking = false;

        const micBtn = document.getElementById('micBtn');
        const statusEl = document.getElementById('status');
        const visualizer = document.getElementById('visualizer');
        const transcript = document.getElementById('transcript');

        // ── State management ─────────────────────────────────────────────
        function setState(state, message) {
            // Remove all state classes
            micBtn.classList.remove('listening', 'thinking', 'speaking', 'connecting', 'reconnecting');
            statusEl.classList.remove('listening', 'thinking', 'speaking', 'connecting', 'reconnecting', 'error');
            visualizer.classList.remove('agent-speaking');

            micBtn.classList.add(state);
            statusEl.classList.add(state);
            statusEl.textContent = message;

            if (state === 'speaking') {
                visualizer.classList.add('agent-speaking');
            }
        }

        // ── Toggle Connection ────────────────────────────────────────────
        window.toggleConnection = async function () {
            if (connected) {
                disconnect();
            } else {
                await connect();
            }
        };

        async function connect() {
            setState('connecting', 'Csatlakozás...');

            try {
                // 1. Get token from our server
                const resp = await fetch('/api/token');
                if (!resp.ok) throw new Error('Token hiba');
                const { token, url } = await resp.json();

                // 2. Create LiveKit room
                room = new Room({
                    audioCaptureDefaults: {
                        autoGainControl: true,
                        echoCancellation: true,
                        noiseSuppression: true,
                    },
                    reconnectPolicy: {
                        maxRetries: 5,
                        maxRetryDelay: 5000,
                    },
                });

                // 3. Handle audio tracks
                room.on(RoomEvent.TrackSubscribed, (track, publication, participant) => {
                    if (track.kind === Track.Kind.Audio) {
                        const el = track.attach();
                        el.id = `audio-${participant.identity}`;
                        document.body.appendChild(el);
                    }
                });

                room.on(RoomEvent.TrackUnsubscribed, (track) => {
                    track.detach().forEach(el => el.remove());
                });

                // 4. Handle transcriptions
                room.on(RoomEvent.TranscriptionReceived, (segments, participant) => {
                    for (const seg of segments) {
                        if (seg.final) {
                            const isAgent = participant?.identity !== room.localParticipant?.identity;
                            addTranscript(isAgent ? 'agent' : 'user', seg.text);
                        }
                    }
                });

                room.on(RoomEvent.DataReceived, (payload, participant, kind, topic) => {
                    try {
                        const text = new TextDecoder().decode(payload);
                        const data = JSON.parse(text);
                        if (data.type === 'transcription' && data.text) {
                            addTranscript(data.role || 'agent', data.text);
                        }
                    } catch (e) { }
                });

                // 5. Track agent speaking state
                room.on(RoomEvent.ParticipantConnected, (participant) => {
                    participant.on(ParticipantEvent.IsSpeakingChanged, (speaking) => {
                        agentSpeaking = speaking;
                        if (speaking) {
                            setState('speaking', 'Beszélek...');
                            visualizer.classList.add('active');
                        } else {
                            setState('listening', 'Hallgatlak...');
                            visualizer.classList.add('active');
                        }
                    });
                });

                // 6. Connection state changes (auto-reconnect)
                room.on(RoomEvent.ConnectionStateChanged, (state) => {
                    switch (state) {
                        case ConnectionState.Reconnecting:
                            reconnecting = true;
                            setState('reconnecting', 'Újracsatlakozás...');
                            break;
                        case ConnectionState.Connected:
                            if (reconnecting) {
                                reconnecting = false;
                                setState('listening', 'Újra csatlakozva! Hallgatlak...');
                            }
                            break;
                    }
                });

                room.on(RoomEvent.Disconnected, (reason) => {
                    if (!reconnecting) {
                        disconnect();
                    }
                });

                // 7. Connect with mic enabled
                await room.connect(url, token);
                await room.localParticipant.setMicrophoneEnabled(true);

                connected = true;
                setState('listening', 'Hallgatlak...');
                visualizer.classList.add('active');
                transcript.classList.add('visible');

            } catch (err) {
                console.error('Connection error:', err);
                setState('error', 'Hiba: ' + err.message);
                micBtn.classList.remove('connecting');
                setTimeout(() => {
                    if (!connected) {
                        statusEl.textContent = 'Kattints a mikrofonra az indításhoz';
                        statusEl.className = 'status';
                    }
                }, 4000);
            }
        }

        function disconnect() {
            if (room) {
                room.disconnect();
                room = null;
            }
            connected = false;
            reconnecting = false;
            agentSpeaking = false;
            micBtn.classList.remove('listening', 'thinking', 'speaking', 'connecting', 'reconnecting');
            statusEl.textContent = 'Kattints a mikrofonra az indításhoz';
            statusEl.className = 'status';
            visualizer.classList.remove('active', 'agent-speaking');
        }

        function addTranscript(role, text) {
            if (!text || text.trim() === '') return;
            const div = document.createElement('div');
            div.className = role;
            div.textContent = (role === 'user' ? '🗣️ ' : '🤖 ') + text;
            transcript.appendChild(div);
            transcript.scrollTop = transcript.scrollHeight;

            // When we see user text, show "thinking" until agent speaks
            if (role === 'user' && connected && !agentSpeaking) {
                setState('thinking', 'Gondolkodom...');
            }
        }
    </script>
</body>

</html>
